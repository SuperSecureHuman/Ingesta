<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Streaming Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#e5a00d'
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        /* Range thumb styling */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            background: #e5a00d;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type=range]::-moz-range-thumb {
            width: 10px;
            height: 10px;
            background: #e5a00d;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        /* Seekbar hover height */
        #seekBar:hover {
            height: 4px;
        }
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #030712;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans overflow-hidden">
    <!-- IDLE STATE: FULL-PAGE FILE BROWSER -->
    <div id="idleContainer" class="flex flex-col h-screen bg-gray-950">
        <!-- Header -->
        <header class="flex items-center justify-between px-6 py-4 border-b border-gray-800 shrink-0">
            <span class="text-xs font-semibold tracking-widest uppercase text-gray-500">HLS Streaming</span>
            <div class="flex items-center gap-3">
                <input id="searchBox" type="text" placeholder="Filter…"
                    class="bg-gray-900 border border-gray-700 rounded-md px-3 py-1.5 text-sm
                           text-gray-100 placeholder-gray-500 focus:outline-none focus:border-accent w-48" />
                <a href="/debug" target="_blank"
                    class="text-xs px-3 py-1.5 bg-gray-900 border border-gray-700 rounded
                           text-gray-500 hover:text-accent hover:border-accent transition-colors">⚙ Debug</a>
            </div>
        </header>

        <!-- Breadcrumb -->
        <nav id="breadcrumb" class="flex items-center gap-1 px-6 py-2 text-xs text-gray-500
                                    font-mono border-b border-gray-800 overflow-x-auto shrink-0 whitespace-nowrap">
        </nav>

        <!-- Grid body -->
        <main class="flex-1 overflow-y-auto px-6 py-6">
            <div id="fileList" class="grid gap-4" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr))">
            </div>
        </main>
    </div>

    <!-- PLAYER STATE -->
    <div id="playerContainer" class="flex flex-col h-screen bg-black" style="display: none">
        <div id="videoViewport" class="relative flex-1 bg-black overflow-hidden">
            <video id="video" class="w-full h-full object-contain"></video>

            <!-- Home button (persistent, always visible) -->
            <button onclick="stopPlayback()"
              class="absolute top-3 left-3 z-40 flex items-center gap-1.5 px-2.5 py-1.5
                     bg-black/60 hover:bg-black/90 rounded-lg text-xs text-gray-400
                     hover:text-gray-100 backdrop-blur-sm transition-all border border-gray-700/50
                     hover:border-gray-600"
              title="Back to library (Esc)">
              ← Library
            </button>

            <!-- Playback Info Panel -->
            <div id="playbackInfoPanel"
                class="absolute top-4 right-4 bottom-16 w-80 bg-black/80 backdrop-blur-sm
                       rounded-xl border border-gray-700 overflow-y-auto z-50
                       hidden flex-col text-xs font-mono">
                <div class="flex items-center justify-between px-4 py-3 border-b border-gray-700 shrink-0">
                    <span class="text-sm font-semibold text-gray-100 font-sans">Playback Info</span>
                    <button onclick="toggleInfoPanel()" class="text-gray-500 hover:text-gray-200 transition-colors">✕</button>
                </div>
                <div id="playbackInfoContent" class="px-4 py-3 space-y-4 overflow-y-auto">
                </div>
            </div>

            <!-- Controls Overlay -->
            <div id="controlsOverlay"
                class="absolute bottom-0 left-0 right-0 opacity-0 pointer-events-none transition-opacity duration-300
                       bg-gradient-to-t from-black/90 to-transparent px-5 pt-16 pb-5">

                <!-- Seekbar Row -->
                <div class="flex flex-col gap-1 mb-3">
                    <div id="seekBar" class="w-full h-0.5 bg-gray-600/40 rounded cursor-pointer relative transition-all">
                        <div id="seekBuffered" class="absolute inset-y-0 left-0 bg-gray-500/50 rounded pointer-events-none"></div>
                        <div id="seekProgress" class="absolute inset-y-0 left-0 bg-accent rounded pointer-events-none"></div>
                    </div>
                    <div class="text-xs text-gray-400 tabular-nums">
                        <span id="currentTime">0:00</span>
                        <span class="text-gray-600"> / </span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <!-- Controls Row -->
                <div class="flex items-center gap-4">
                    <!-- Play/Pause -->
                    <button id="playPauseBtn" onclick="togglePlayPause()"
                        class="text-gray-100 hover:text-accent text-xl transition-colors p-1">▶</button>

                    <!-- Quality pill + popover -->
                    <div class="relative" id="qualityPill">
                        <button onclick="toggleQualityPopover()"
                            class="flex items-center gap-1.5 px-3 py-1.5 bg-gray-900 border border-gray-700
                                   rounded text-xs text-gray-100 hover:border-accent transition-colors cursor-pointer">
                            <span id="qualityLabel">Source</span>
                            <span class="text-gray-500">▾</span>
                        </button>
                        <!-- Popover -->
                        <div id="qualityPopover"
                            class="hidden absolute bottom-full left-0 mb-1 bg-gray-900 border border-gray-700
                                 rounded-lg overflow-hidden z-50 min-w-max shadow-2xl">
                        </div>
                    </div>

                    <!-- Volume -->
                    <button id="volumeBtn" onclick="toggleVolumeMute()"
                        class="text-gray-100 hover:text-accent text-lg transition-colors p-1">🔊</button>
                    <input type="range" id="volumeSlider" min="0" max="100" value="100" onchange="setVolume()"
                        class="w-20 h-0.5 cursor-pointer bg-gray-600/40 rounded appearance-none" />

                    <!-- Spacer -->
                    <span class="flex-1"></span>

                    <!-- Info button -->
                    <button onclick="toggleInfoPanel()"
                        class="text-gray-400 hover:text-accent text-base transition-colors p-1"
                        title="Playback info (I)">ⓘ</button>

                    <!-- Fullscreen -->
                    <button id="fullscreenBtn" onclick="toggleFullscreen()"
                        class="text-gray-100 hover:text-accent text-lg transition-colors p-1">⛶</button>

                    <!-- Stop -->
                    <button id="stopBtn" onclick="stopPlayback()"
                        class="text-gray-400 hover:text-accent text-lg transition-colors p-1">⏹</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <script>
        // ===== STATE =====
        let sessionId = generateUUID();
        let hls = null;
        let currentFilePath = null;
        let currentQuality = "source";
        let currentSegmentLength = 6;
        let currentBrowserPath = "/";
        let controlsHideTimer = null;
        let pingInterval = null;
        let isPlaying = false;
        let probeData = null;
        let sourceResLabel = 'Source';
        let infoVisible = false;
        let capabilities = null;
        let transcodeStats = {};
        let transcodeStatsInterval = null;

        const VIDEO = document.getElementById('video');
        const IDLE_CONTAINER = document.getElementById('idleContainer');
        const PLAYER_CONTAINER = document.getElementById('playerContainer');
        const CONTROLS_OVERLAY = document.getElementById('controlsOverlay');
        const VIDEO_VIEWPORT = document.getElementById('videoViewport');

        // ===== UTILITY FUNCTIONS =====
        function generateUUID() {
            if (typeof crypto !== 'undefined' && typeof crypto.getRandomValues === 'function') {
                try {
                    return crypto.randomUUID();
                } catch (e) {
                    // Fallback
                }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) {
                return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        // ===== INITIALIZATION =====
        function initSession() {
            console.log('Session ID:', sessionId);
        }

        async function loadCapabilities() {
            try {
                const resp = await fetch('/api/capabilities');
                capabilities = await resp.json();
            } catch (e) {
                console.warn('Failed to load capabilities:', e);
                capabilities = { hardware: {} };
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadCapabilities();
            initSession();
            setupDragDrop();
            setupKeyboardShortcuts();
            setupVideoEvents();
            setupControlsAutoHide();
            setupBeforeUnload();
            setupVisibilityChange();
            openFileBrowser();  // Load browser on startup
            setupSearchBox();
        });

        // ===== DRAG & DROP =====
        function setupDragDrop() {
            const dragZone = IDLE_CONTAINER;

            dragZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragZone.classList.add('ring-2', 'ring-inset', 'ring-accent');
            });

            dragZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragZone.classList.remove('ring-2', 'ring-inset', 'ring-accent');
            });

            dragZone.addEventListener('drop', async (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragZone.classList.remove('ring-2', 'ring-inset', 'ring-accent');

                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    if (isVideoFile(file.name)) {
                        console.log('Dropped video file:', file.name);
                    }
                }
            });
        }

        function isVideoFile(name) {
            const videoExts = ['mp4', 'mkv', 'webm', 'mov', 'avi', 'm3u8', 'ts'];
            const ext = name.split('.').pop().toLowerCase();
            return videoExts.includes(ext);
        }

        // ===== SEARCH BOX =====
        function setupSearchBox() {
            document.getElementById('searchBox').addEventListener('input', (e) => {
                filterFileList(e.target.value.toLowerCase());
            });
        }

        function filterFileList(query) {
            const cards = document.querySelectorAll('#fileList [data-name]');
            cards.forEach(card => {
                const name = card.dataset.name.toLowerCase();
                const match = query.length === 0 || name.includes(query);
                card.classList.toggle('hidden', !match);
            });
        }

        // ===== BREADCRUMB =====
        function renderBreadcrumb(fullPath) {
            const crumb = document.getElementById('breadcrumb');
            crumb.innerHTML = '';
            const parts = fullPath.split('/').filter(Boolean);
            const paths = parts.map((_, i) => '/' + parts.slice(0, i + 1).join('/'));

            // Root link
            const root = document.createElement('button');
            root.textContent = '/';
            root.className = 'hover:text-accent transition-colors bg-transparent border-0 text-inherit cursor-pointer';
            root.onclick = (e) => { e.preventDefault(); loadBrowserDirectory('/'); };
            crumb.appendChild(root);

            paths.forEach((p, i) => {
                const sep = document.createElement('span');
                sep.textContent = ' / ';
                sep.className = 'text-gray-700';
                crumb.appendChild(sep);

                const btn = document.createElement('button');
                btn.textContent = parts[i];
                btn.className = i === paths.length - 1
                    ? 'text-gray-200 font-medium cursor-default bg-transparent border-0 text-inherit'
                    : 'hover:text-accent transition-colors bg-transparent border-0 text-inherit cursor-pointer';
                if (i < paths.length - 1) {
                    btn.onclick = (e) => { e.preventDefault(); loadBrowserDirectory(p); };
                }
                crumb.appendChild(btn);
            });
        }

        // ===== QUALITY MANAGEMENT =====
        async function changeQuality(newQuality) {
            closeQualityPopover();
            if (newQuality === currentQuality) return;
            currentQuality = newQuality;
            updateQualityLabel();
            if (!isPlaying) return;

            const seekTime = VIDEO.currentTime;

            // Kill current HLS and FFmpeg
            if (hls) { hls.destroy(); hls = null; }
            try { await fetch(`/api/stop/${sessionId}`, { method: 'POST' }); } catch(e) {}

            // Restart from same position with new quality
            await startPlayback(seekTime);
        }

        // ===== FILE BROWSER =====
        async function openFileBrowser() {
            try {
                // Fetch media root from capabilities
                const capsResp = await fetch('/api/capabilities');
                const caps = await capsResp.json();
                const mediaRoot = caps.media_root || '/';

                currentBrowserPath = mediaRoot;
                await loadBrowserDirectory(mediaRoot);
            } catch (e) {
                console.error('Failed to open file browser:', e);
                currentBrowserPath = '/';
                loadBrowserDirectory('/');
            }
        }

        function closeBrowser() {
            // No-op now (browser is always visible)
        }

        async function loadBrowserDirectory(path) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = `
                <div class="col-span-full flex items-center justify-center py-20 text-gray-600">
                    <span class="animate-spin text-2xl mr-3">↻</span> Loading…
                </div>`;

            try {
                document.getElementById('searchBox').value = '';  // Clear search on nav

                const resp = await fetch(`/api/browse?path=${encodeURIComponent(path)}`);
                if (!resp.ok) throw new Error('Browse failed');
                const data = await resp.json();
                currentBrowserPath = data.path;

                renderBreadcrumb(data.path);

                fileList.innerHTML = '';

                // Parent link
                if (data.parent) {
                    const item = document.createElement('div');
                    item.className = 'group cursor-pointer rounded-lg border border-gray-800 bg-gray-900 hover:border-accent hover:bg-gray-800 transition-all p-4 flex flex-col items-center gap-3';
                    item.dataset.name = '..';
                    item.innerHTML = '<div class="text-4xl">⬆</div><span class="text-sm text-gray-300 text-center truncate w-full">..</span>';
                    item.onclick = () => loadBrowserDirectory(data.parent);
                    fileList.appendChild(item);
                }

                // Entries
                for (const entry of data.entries) {
                    const isDir = entry.is_dir;
                    const isVideo = entry.is_video;

                    if (isDir) {
                        // Directory card
                        const item = document.createElement('div');
                        item.className = 'group cursor-pointer rounded-lg border border-gray-800 bg-gray-900 hover:border-accent hover:bg-gray-800 transition-all p-4 flex flex-col items-center gap-3';
                        item.dataset.name = entry.name;
                        item.innerHTML = `
                            <div class="text-4xl">📁</div>
                            <span class="text-sm text-gray-300 text-center truncate w-full">${entry.name}</span>
                        `;
                        item.onclick = () => loadBrowserDirectory(entry.path);
                        fileList.appendChild(item);
                    } else if (isVideo) {
                        // Video card (16:9 thumbnail)
                        const posterUrl = `/api/poster?path=${encodeURIComponent(entry.path)}`;
                        const item = document.createElement('div');
                        item.className = 'group cursor-pointer rounded-lg border border-gray-800 bg-gray-900 hover:border-accent overflow-hidden transition-all';
                        item.dataset.name = entry.name;
                        item.innerHTML = `
                            <div class="aspect-video relative bg-gray-800">
                                <img src="${posterUrl}" alt="${entry.name}" loading="lazy"
                                     class="absolute inset-0 w-full h-full object-cover"
                                     onerror="this.style.display='none'">
                                <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                    <span class="text-4xl drop-shadow">▶</span>
                                </div>
                            </div>
                            <div class="px-3 py-2">
                                <p class="text-sm text-gray-200 truncate" title="${entry.name}">${entry.name}</p>
                            </div>
                        `;
                        item.onclick = async () => {
                            currentFilePath = entry.path;
                            await probeAndPopulateQuality();
                            startPlayback();
                        };
                        fileList.appendChild(item);
                    }
                }
            } catch (e) {
                fileList.innerHTML = `
                    <div class="col-span-full text-center py-20 text-red-400 text-sm">
                        Error: ${e.message}
                    </div>`;
            }
        }

        async function probeAndPopulateQuality() {
            try {
                const resp = await fetch(`/api/probe?path=${encodeURIComponent(currentFilePath)}`);
                if (!resp.ok) throw new Error('Probe failed');
                probeData = await resp.json();

                // Fetch available bitrate tiers from server
                const capsResp = await fetch(`/api/capabilities`);
                const caps = await capsResp.json();
                const tiers = caps.bitrate_tiers || [];

                // Populate quality dropdown
                const popover = document.getElementById('qualityPopover');
                popover.innerHTML = '';

                // Source option with bitrate label
                const mbps = (probeData.bitrate / 1_000_000).toFixed(1);
                const resLabel = probeData.height >= 2160 ? '4K'
                               : probeData.height >= 1440 ? '1440p'
                               : probeData.height >= 1080 ? '1080p'
                               : probeData.height >= 720  ? '720p'
                               : `${probeData.height}p`;
                sourceResLabel = resLabel;

                let opt = document.createElement('div');
                opt.className = 'px-3 py-2.5 cursor-pointer text-xs text-gray-100 border-b border-gray-800 last:border-0 hover:bg-gray-800 transition-colors bg-accent text-gray-950 hover:bg-amber-400 font-semibold';
                opt.textContent = `Source — ${resLabel} · ${mbps} Mbps`;
                opt.onclick = () => { changeQuality('source'); };
                popover.appendChild(opt);

                // Bitrate tiers
                for (const tier of tiers) {
                    if (tier.max_height && tier.max_height > probeData.height) continue;
                    if (tier.bitrate >= probeData.bitrate) continue;

                    opt = document.createElement('div');
                    opt.className = 'px-3 py-2.5 cursor-pointer text-xs text-gray-100 border-b border-gray-800 last:border-0 hover:bg-gray-800 transition-colors';
                    opt.textContent = tier.label;
                    opt.dataset.key = tier.key;
                    opt.onclick = () => { changeQuality(tier.key); };
                    popover.appendChild(opt);
                }

                updateQualityLabel();
            } catch (e) {
                console.warn('Error probing:', e.message);
            }
        }

        function updateQualityLabel() {
            document.getElementById('qualityLabel').textContent =
                currentQuality === 'source' ? sourceResLabel : currentQuality;
        }

        // ===== QUALITY POPOVER =====
        function toggleQualityPopover() {
            const popover = document.getElementById('qualityPopover');
            popover.classList.toggle('hidden');
            popover.classList.toggle('block');
        }

        function closeQualityPopover() {
            const popover = document.getElementById('qualityPopover');
            popover.classList.add('hidden');
            popover.classList.remove('block');
        }

        // ===== PLAYBACK INFO PANEL =====
        function toggleInfoPanel() {
            infoVisible = !infoVisible;
            const panel = document.getElementById('playbackInfoPanel');
            panel.classList.toggle('hidden', !infoVisible);
            panel.classList.toggle('flex', infoVisible);
            if (infoVisible) updateInfoPanel();
        }

        function startTranscodeStatsPoll() {
            stopTranscodeStatsPoll();
            transcodeStatsInterval = setInterval(fetchTranscodeStats, 2000);
        }

        function stopTranscodeStatsPoll() {
            if (transcodeStatsInterval) {
                clearInterval(transcodeStatsInterval);
                transcodeStatsInterval = null;
            }
        }

        async function fetchTranscodeStats() {
            try {
                const resp = await fetch('/api/debug/state');
                const data = await resp.json();
                const active = data.jobs.find(j => !j.has_exited && j.transcode_fps > 0);
                transcodeStats = active ? {
                    fps: active.transcode_fps,
                    speed: active.transcode_speed
                } : {};
            } catch (e) {
                // Silent fail
            }
        }

        function formatInfoSection(title, rows) {
            const items = rows.map(([k, v]) =>
                `<div class="flex justify-between gap-2 py-0.5">
                   <span class="text-gray-500 shrink-0">${k}</span>
                   <span class="text-gray-200 text-right truncate">${v ?? '—'}</span>
                 </div>`
            ).join('');
            return `<div>
                <div class="text-gray-400 font-sans font-semibold text-xs mb-1.5 uppercase tracking-wider">${title}</div>
                <div class="space-y-0.5">${items}</div>
              </div>`;
        }

        function updateInfoPanel() {
            if (!infoVisible) return;
            const v = VIDEO;
            const q = v.getVideoPlaybackQuality ? v.getVideoPlaybackQuality() : {};

            let bufferedSec = 0;
            if (v.buffered.length > 0) {
                bufferedSec = (v.buffered.end(v.buffered.length - 1) - v.currentTime).toFixed(1);
            }

            const encoderLabel = capabilities?.hardware?.h264_videotoolbox ? 'VideoToolbox'
                               : capabilities?.hardware?.h264_nvenc ? 'NVENC'
                               : capabilities?.hardware?.h264_qsv ? 'QSV'
                               : capabilities?.hardware?.h264_vaapi ? 'VAAPI'
                               : 'libx264 (software)';

            const container = currentFilePath ? currentFilePath.split('.').pop().toUpperCase() : '—';
            const sourceMbps = probeData ? (probeData.bitrate / 1_000_000).toFixed(1) + ' Mbps' : '—';
            const sourceRes = probeData ? `${probeData.width}×${probeData.height}` : '—';

            // Source codec info
            const srcCodec = probeData?.video_codec?.toUpperCase() || '—';
            const srcBitDepth = probeData?.bit_depth ? `${probeData.bit_depth}-bit` : '—';
            const srcAudioCodec = probeData?.audio_codec?.toUpperCase() || '—';
            const srcPixFmt = probeData?.pix_fmt || '—';

            // Target codec (deterministic from quality + encoder)
            const isDirectCopy = currentQuality === 'source';
            const tgtVideoCodec = isDirectCopy ? srcCodec : 'H.264 (AVC)';
            const tgtBitDepth = isDirectCopy ? srcBitDepth : '8-bit';
            const tgtAudioCodec = isDirectCopy ? srcAudioCodec : 'AAC';
            const tgtPixFmt = isDirectCopy ? srcPixFmt : 'yuv420p';

            const sections = [
                formatInfoSection('Player', [
                    ['Play method', currentQuality === 'source' ? 'Direct copy' : 'Transcoded HLS'],
                    ['Quality', currentQuality === 'source' ? sourceResLabel : currentQuality],
                    ['Encoder', currentQuality === 'source' ? 'Copy (no encode)' : encoderLabel],
                    ['Segment length', `${currentSegmentLength}s`],
                    ['Transcode FPS', transcodeStats.fps ? `${transcodeStats.fps.toFixed(0)} fps` : '—'],
                    ['Speed', transcodeStats.speed ? `${transcodeStats.speed.toFixed(2)}x real-time` : '—'],
                ]),
                formatInfoSection('Video (live)', [
                    ['Dimensions', `${v.videoWidth}×${v.videoHeight}`],
                    ['Current time', formatTime(v.currentTime)],
                    ['Buffered ahead', `${bufferedSec}s`],
                    ['Dropped frames', q.droppedVideoFrames ?? '—'],
                    ['Corrupted frames', q.corruptedVideoFrames ?? '—'],
                    ['Total frames', q.totalVideoFrames ?? '—'],
                ]),
                formatInfoSection('Codecs', [
                    ['Source video', `${srcCodec} · ${srcBitDepth}`],
                    ['Source audio', srcAudioCodec],
                    ['Source pixel fmt', srcPixFmt],
                    ['Output video', `${tgtVideoCodec} · ${tgtBitDepth}`],
                    ['Output audio', tgtAudioCodec],
                    ['Output pixel fmt', tgtPixFmt],
                ]),
                formatInfoSection('Original Media', [
                    ['Container', container],
                    ['Resolution', sourceRes],
                    ['Bitrate', sourceMbps],
                    ['Duration', probeData ? formatTime(probeData.duration_seconds) : '—'],
                ]),
            ];

            document.getElementById('playbackInfoContent').innerHTML = sections.join('');
        }

        // ===== PLAYBACK =====
        async function startPlayback(seekTime = 0) {
            if (!currentFilePath) {
                alert('No file selected');
                return;
            }

            try {
                IDLE_CONTAINER.classList.add('hidden');
                PLAYER_CONTAINER.style.display = 'flex';

                const playlistUrl = `/api/playlist/${sessionId}/main.m3u8?path=${encodeURIComponent(currentFilePath)}&quality=${currentQuality}&segment_length=${currentSegmentLength}`;

                if (Hls.isSupported()) {
                    hls = new Hls({
                        debug: false,
                        enableWorker: true,
                        maxBufferLength: 30,
                        maxMaxBufferLength: 60,
                        backBufferLength: 10,
                        maxBufferSize: 100 * 1000 * 1000,
                    });

                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        VIDEO.play();
                        if (seekTime > 0) { VIDEO.currentTime = seekTime; }
                    });

                    hls.on(Hls.Events.ERROR, (event, data) => {
                        console.error('HLS error:', data);
                    });

                    hls.loadSource(playlistUrl);
                    hls.attachMedia(VIDEO);
                } else if (VIDEO.canPlayType('application/vnd.apple.mpegurl')) {
                    VIDEO.src = playlistUrl;
                    VIDEO.play();
                }

                startPingLoop();
                startTranscodeStatsPoll();
            } catch (e) {
                alert('Error starting playback: ' + e.message);
                stopPlayback();
            }
        }

        function stopPlayback() {
            if (pingInterval) clearInterval(pingInterval);
            if (hls) hls.destroy();
            stopTranscodeStatsPoll();

            VIDEO.pause();
            VIDEO.src = '';

            if (sessionId) {
                fetch(`/api/stop/${sessionId}`, { method: 'POST' }).catch(e => console.warn(e));
            }

            currentFilePath = null;
            isPlaying = false;
            infoVisible = false;
            PLAYER_CONTAINER.style.display = 'none';
            IDLE_CONTAINER.classList.remove('hidden');
            document.getElementById('playbackInfoPanel').classList.add('hidden');
            updatePlayPauseButton();
        }

        // ===== VIDEO EVENTS =====
        function setupVideoEvents() {
            VIDEO.addEventListener('play', () => {
                isPlaying = true;
                updatePlayPauseButton();
                showControls();
            });

            VIDEO.addEventListener('pause', () => {
                isPlaying = false;
                updatePlayPauseButton();
                showControls();
            });

            VIDEO.addEventListener('timeupdate', () => {
                updateTimeDisplay();
                updateSeekBar();
                updateInfoPanel();
            });

            VIDEO.addEventListener('loadedmetadata', () => {
                updateTimeDisplay();
            });

            VIDEO.addEventListener('progress', () => {
                updateBufferedRange();
            });
        }

        function updatePlayPauseButton() {
            const btn = document.getElementById('playPauseBtn');
            btn.textContent = isPlaying ? '⏸' : '▶';
        }

        function togglePlayPause() {
            if (isPlaying) {
                VIDEO.pause();
            } else {
                VIDEO.play();
            }
        }

        function updateTimeDisplay() {
            const current = formatTime(VIDEO.currentTime);
            const total = formatTime(VIDEO.duration);
            document.getElementById('currentTime').textContent = current;
            document.getElementById('totalTime').textContent = total;
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) {
                return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function updateSeekBar() {
            const seekBar = document.getElementById('seekBar');
            const progress = document.getElementById('seekProgress');
            if (VIDEO.duration) {
                const pct = (VIDEO.currentTime / VIDEO.duration) * 100;
                progress.style.width = pct + '%';
            }
        }

        function updateBufferedRange() {
            const buffered = document.getElementById('seekBuffered');
            const seekBar = document.getElementById('seekBar');
            if (VIDEO.buffered.length > 0) {
                const end = VIDEO.buffered.end(VIDEO.buffered.length - 1);
                const pct = (end / VIDEO.duration) * 100;
                buffered.style.width = pct + '%';
            }
        }

        // ===== SEEK BAR INTERACTION =====
        document.addEventListener('DOMContentLoaded', () => {
            const seekBar = document.getElementById('seekBar');
            seekBar.addEventListener('click', (e) => {
                if (!VIDEO.duration) return;
                const rect = seekBar.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const pct = x / rect.width;
                VIDEO.currentTime = pct * VIDEO.duration;
            });
        });

        // ===== VOLUME =====
        function setVolume() {
            const slider = document.getElementById('volumeSlider');
            VIDEO.volume = parseInt(slider.value) / 100;
        }

        function toggleVolumeMute() {
            const slider = document.getElementById('volumeSlider');
            if (VIDEO.volume > 0) {
                VIDEO.volume = 0;
                slider.value = 0;
            } else {
                VIDEO.volume = 1;
                slider.value = 100;
            }
        }

        // ===== FULLSCREEN =====
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                VIDEO_VIEWPORT.requestFullscreen().catch(err => console.error(err));
            } else {
                document.exitFullscreen();
            }
        }

        // ===== CONTROLS AUTO-HIDE =====
        function setupControlsAutoHide() {
            VIDEO_VIEWPORT.addEventListener('mousemove', () => {
                showControls();
            });

            VIDEO_VIEWPORT.addEventListener('mouseleave', () => {
                if (isPlaying) {
                    scheduleControlsHide();
                }
            });

            VIDEO_VIEWPORT.addEventListener('mouseenter', () => {
                if (controlsHideTimer) clearTimeout(controlsHideTimer);
            });
        }

        function showControls() {
            CONTROLS_OVERLAY.classList.remove('opacity-0', 'pointer-events-none');
            CONTROLS_OVERLAY.classList.add('opacity-100');
            if (controlsHideTimer) clearTimeout(controlsHideTimer);
            if (isPlaying) {
                scheduleControlsHide();
            }
        }

        function scheduleControlsHide() {
            controlsHideTimer = setTimeout(() => {
                if (isPlaying && !document.querySelector('#qualityPopover:not(.hidden)')) {
                    CONTROLS_OVERLAY.classList.add('opacity-0', 'pointer-events-none');
                    CONTROLS_OVERLAY.classList.remove('opacity-100');
                }
            }, 3000);
        }

        // ===== PING LOOP =====
        function startPingLoop() {
            if (pingInterval) clearInterval(pingInterval);
            pingInterval = setInterval(() => {
                fetch(`/api/ping/${sessionId}`, { method: 'POST' }).catch(e => console.warn(e));
            }, 10000);
        }

        // ===== KEYBOARD SHORTCUTS =====
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;

                switch (e.key.toLowerCase()) {
                    case ' ':
                        e.preventDefault();
                        if (currentFilePath) togglePlayPause();
                        break;
                    case 'f':
                        e.preventDefault();
                        if (currentFilePath) toggleFullscreen();
                        break;
                    case 'm':
                        e.preventDefault();
                        if (currentFilePath) toggleVolumeMute();
                        break;
                    case 'i':
                        e.preventDefault();
                        if (currentFilePath) toggleInfoPanel();
                        break;
                    case 'escape':
                        e.preventDefault();
                        if (currentFilePath) stopPlayback();
                        break;
                    case 'arrowleft':
                        if (currentFilePath) VIDEO.currentTime = Math.max(0, VIDEO.currentTime - 10);
                        break;
                    case 'arrowright':
                        if (currentFilePath) VIDEO.currentTime = Math.min(VIDEO.duration, VIDEO.currentTime + 10);
                        break;
                }
            });
        }

        // ===== LIFECYCLE =====
        function setupBeforeUnload() {
            window.addEventListener('beforeunload', () => {
                if (sessionId) {
                    navigator.sendBeacon(`/api/stop/${sessionId}`, '');
                }
            });
        }

        function setupVisibilityChange() {
            // Stream runs in background — only stopped on page unload (beforeunload/sendBeacon)
            // Do NOT call stopPlayback on tab switch — FFmpeg keeps producing segments
        }
    </script>
</body>
</html>
