<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Debug Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            padding: 20px;
            line-height: 1.5;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #e5a00d;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            padding: 6px 12px;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.connected { background: #00ff00; }
        .status-dot.disconnected { background: #ff0000; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 16px;
        }

        .panel-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: #e5a00d;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
            font-size: 13px;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label {
            color: #888;
            font-weight: 500;
        }

        .info-value {
            color: #e5a00d;
            font-family: 'Courier New', monospace;
        }

        .hardware-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .hw-badge {
            padding: 6px 10px;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 2px;
            font-size: 11px;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        .hw-badge.available { border-color: #00ff00; color: #00ff00; }
        .hw-badge.unavailable { border-color: #444; color: #666; }

        .table-container {
            grid-column: 1 / -1;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        thead {
            background: #0a0a0a;
            border-bottom: 2px solid #2a2a2a;
        }

        th {
            padding: 10px;
            text-align: left;
            color: #e5a00d;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        th:hover { background: #1a1a1a; }

        th.sorted::after {
            content: ' ↑';
            font-size: 10px;
        }

        th.sorted.desc::after {
            content: ' ↓';
        }

        tbody tr {
            border-bottom: 1px solid #2a2a2a;
        }

        tbody tr:hover { background: #1a1a1a; }

        td {
            padding: 10px;
            font-family: 'Courier New', monospace;
            color: #f0f0f0;
        }

        .session-id {
            color: #e5a00d;
            font-weight: 500;
        }

        .status-running {
            color: #00ff00;
        }

        .status-stopped {
            color: #ff0000;
        }

        .truncated {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .event-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 12px;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 3px;
            color: #888;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .filter-btn:hover { border-color: #e5a00d; color: #e5a00d; }
        .filter-btn.active {
            background: #e5a00d;
            border-color: #e5a00d;
            color: #0a0a0a;
        }

        .control-btn {
            padding: 6px 12px;
            background: #e5a00d;
            border: none;
            border-radius: 3px;
            color: #0a0a0a;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }

        .control-btn:hover { background: #f5b820; }
        .control-btn.secondary {
            background: #2a2a2a;
            color: #e5a00d;
            border: 1px solid #e5a00d;
        }

        .control-btn.secondary:hover { background: #3a3a3a; }

        .event-log {
            max-height: 400px;
            overflow-y: auto;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 3px;
            padding: 8px;
        }

        .event-item {
            padding: 8px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .event-item:last-child { border-bottom: none; }

        .event-time {
            color: #666;
            flex-shrink: 0;
            min-width: 80px;
        }

        .event-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 2px;
            font-weight: 600;
            font-size: 10px;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .event-badge.spawn { background: #00d4ff; color: #000; }
        .event-badge.seek { background: #ffd700; color: #000; }
        .event-badge.served { background: #00ff00; color: #000; }
        .event-badge.killed { background: #ff0000; color: #fff; }
        .event-badge.error { background: #ff6b6b; color: #fff; }
        .event-badge.state { background: #888; color: #fff; }

        .event-text {
            color: #ccc;
            flex: 1;
            word-break: break-all;
        }

        .empty-state {
            color: #666;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }

        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
            .table-container { grid-column: 1; }
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .header { flex-direction: column; gap: 10px; align-items: flex-start; }
            table { font-size: 11px; }
            td, th { padding: 6px; }
            .panel { padding: 12px; }
        }

        /* Scrollbar styling */
        .event-log::-webkit-scrollbar,
        tbody::-webkit-scrollbar {
            width: 6px;
        }

        .event-log::-webkit-scrollbar-track,
        tbody::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .event-log::-webkit-scrollbar-thumb,
        tbody::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }

        .event-log::-webkit-scrollbar-thumb:hover,
        tbody::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙ HLS Debug Panel</h1>
        <div class="connection-status">
            <span class="status-dot disconnected" id="connectionDot"></span>
            <span id="connectionText">Connecting...</span>
        </div>
    </div>

    <div class="main-grid">
        <!-- Server Info Panel -->
        <div class="panel">
            <div class="panel-title">Server Info</div>
            <div class="info-row">
                <span class="info-label">Uptime</span>
                <span class="info-value" id="uptime">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Active Sessions</span>
                <span class="info-value" id="activeSessions">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">Disk Usage</span>
                <span class="info-value" id="diskUsage">—</span>
            </div>
        </div>

        <!-- Hardware Info Panel -->
        <div class="panel">
            <div class="panel-title">Hardware Capabilities</div>
            <div class="hardware-grid" id="hardwareGrid">
                <div class="hw-badge unavailable">VideoToolbox</div>
                <div class="hw-badge unavailable">NVENC</div>
                <div class="hw-badge unavailable">QSV</div>
                <div class="hw-badge unavailable">VAAPI</div>
            </div>
        </div>

        <!-- Active Sessions Table -->
        <div class="table-container">
            <div class="panel-title" style="padding: 16px 16px 0 0;">Active Sessions</div>
            <table>
                <thead>
                    <tr>
                        <th onclick="sortTable('session_id')">Session ID</th>
                        <th onclick="sortTable('file')">File</th>
                        <th onclick="sortTable('quality')">Quality</th>
                        <th onclick="sortTable('pid')">PID</th>
                        <th onclick="sortTable('status')">Status</th>
                        <th onclick="sortTable('transcode_pos')">Transcode Pos</th>
                        <th onclick="sortTable('download_pos')">Download Pos</th>
                        <th onclick="sortTable('throttled')">Throttled</th>
                    </tr>
                </thead>
                <tbody id="sessionsTable">
                    <tr><td colspan="8" class="empty-state">No active sessions</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Event Log Panel -->
        <div class="panel" style="grid-column: 1 / -1;">
            <div class="panel-title">Event Log</div>
            <div class="event-controls">
                <button class="filter-btn active" onclick="filterEvents('all')">All</button>
                <button class="filter-btn" onclick="filterEvents('spawn')">Spawn</button>
                <button class="filter-btn" onclick="filterEvents('seek')">Seek</button>
                <button class="filter-btn" onclick="filterEvents('served')">Served</button>
                <button class="filter-btn" onclick="filterEvents('killed')">Killed</button>
                <button class="filter-btn" onclick="filterEvents('error')">Error</button>
                <div style="flex: 1;"></div>
                <button class="control-btn secondary" onclick="toggleEventScroll()" id="pauseBtn">⏸ Pause</button>
                <button class="control-btn secondary" onclick="clearEvents()">Clear</button>
                <button class="control-btn secondary" onclick="exportEvents()">Export</button>
            </div>
            <div class="event-log" id="eventLog"></div>
        </div>
    </div>

    <script>
        const MAX_EVENTS = 200;
        const SERVER_START_TIME = Date.now();

        let eventSource = null;
        let allEvents = [];
        let currentFilter = 'all';
        let autoScroll = true;
        let sessions = {};
        let sortColumn = null;
        let sortDesc = false;

        // Initialize
        init();

        function init() {
            connectSSE();
            fetchInitialState();
            setInterval(updateUptime, 1000);
            setInterval(updateSessionCount, 1000);
        }

        function connectSSE() {
            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource('/api/debug/events');

            eventSource.onopen = () => {
                updateConnectionStatus(true);
            };

            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleEvent(data);
                } catch (e) {
                    console.error('Failed to parse SSE event:', e);
                }
            };

            eventSource.onerror = () => {
                updateConnectionStatus(false);
                eventSource.close();
                // Attempt to reconnect after 3s
                setTimeout(connectSSE, 3000);
            };
        }

        function updateConnectionStatus(connected) {
            const dot = document.getElementById('connectionDot');
            const text = document.getElementById('connectionText');
            if (connected) {
                dot.className = 'status-dot connected';
                text.textContent = 'Connected';
            } else {
                dot.className = 'status-dot disconnected';
                text.textContent = 'Disconnected';
            }
        }

        async function fetchInitialState() {
            try {
                const resp = await fetch('/api/debug/state');
                const data = await resp.json();
                if (data.jobs) {
                    for (const job of data.jobs) {
                        sessions[job.stream_id] = job;
                    }
                    updateSessionsTable();
                }
            } catch (e) {
                console.error('Failed to fetch initial state:', e);
            }
        }

        function handleEvent(event) {
            if (event.type === 'state_snapshot') {
                // Update all sessions from snapshot
                sessions = {};
                if (event.jobs) {
                    for (const job of event.jobs) {
                        sessions[job.stream_id] = job;
                    }
                }
                updateSessionsTable();
            } else if (event.type === 'spawn') {
                addEvent(event, 'spawn', `Spawned seg=${event.start_segment} pid=${event.pid} t=${toFixed(event.start_time_sec, 1)}s`);
            } else if (event.type === 'seek') {
                addEvent(event, 'seek', `Seek ${event.from_segment}→${event.to_segment} t=${toFixed(event.seek_time_sec, 1)}s`);
            } else if (event.type === 'served') {
                addEvent(event, 'served', `Served seg=${event.segment_id}`);
            } else if (event.type === 'killed') {
                addEvent(event, 'killed', `Killed pid=${event.pid} reason=${event.reason}`);
            } else if (event.type === 'error') {
                addEvent(event, 'error', `Error: ${event.message}`);
            }
        }

        function addEvent(data, type, message) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false });

            allEvents.unshift({
                time: timeStr,
                type: type,
                message: message,
                data: data
            });

            // Keep only last 200 events
            if (allEvents.length > MAX_EVENTS) {
                allEvents = allEvents.slice(0, MAX_EVENTS);
            }

            renderEventLog();

            // Auto-scroll to top
            if (autoScroll) {
                const container = document.getElementById('eventLog');
                container.scrollTop = 0;
            }
        }

        function renderEventLog() {
            const container = document.getElementById('eventLog');
            const filteredEvents = currentFilter === 'all'
                ? allEvents
                : allEvents.filter(e => e.type === currentFilter);

            if (filteredEvents.length === 0) {
                container.innerHTML = '<div class="empty-state">No events</div>';
                return;
            }

            container.innerHTML = filteredEvents.map(e => `
                <div class="event-item">
                    <span class="event-time">${e.time}</span>
                    <span class="event-badge ${e.type}">${e.type}</span>
                    <span class="event-text">${escapeHtml(e.message)}</span>
                </div>
            `).join('');
        }

        function filterEvents(type) {
            currentFilter = type;

            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            renderEventLog();
        }

        function toggleEventScroll() {
            autoScroll = !autoScroll;
            const btn = document.getElementById('pauseBtn');
            btn.textContent = autoScroll ? '⏸ Pause' : '▶ Resume';
        }

        function clearEvents() {
            if (confirm('Clear all events?')) {
                allEvents = [];
                renderEventLog();
            }
        }

        function exportEvents() {
            const json = JSON.stringify(allEvents, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `hls-events-${Date.now()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function updateSessionsTable() {
            const tbody = document.getElementById('sessionsTable');
            const jobs = Object.values(sessions).sort((a, b) => {
                if (!sortColumn) return 0;
                let aVal = a[sortColumn];
                let bVal = b[sortColumn];
                if (typeof aVal === 'string') {
                    return sortDesc ? bVal.localeCompare(aVal) : aVal.localeCompare(bVal);
                }
                return sortDesc ? bVal - aVal : aVal - bVal;
            });

            if (jobs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No active sessions</td></tr>';
                return;
            }

            tbody.innerHTML = jobs.map(job => {
                const sessionIdShort = job.stream_id.substring(0, 8);
                const fileName = job.source_path ? new URL('file://' + job.source_path).pathname.split('/').pop() : '—';
                const status = job.has_exited ? '⏹ stopped' : '▶ running';
                const statusClass = job.has_exited ? 'status-stopped' : 'status-running';
                const transcodeSec = toFixed((job.start_time_sec || 0), 1);
                const downloadSec = toFixed((job.download_position_ticks || 0) / 10_000_000, 1);

                return `
                    <tr>
                        <td class="session-id">${sessionIdShort}</td>
                        <td class="truncated" title="${job.source_path || '—'}">${escapeHtml(fileName)}</td>
                        <td>${escapeHtml(job.quality || '—')}</td>
                        <td>${job.pid || '—'}</td>
                        <td class="${statusClass}">${status}</td>
                        <td>${transcodeSec}s</td>
                        <td>${downloadSec}s</td>
                        <td>${job.active_requests > 0 ? 'yes' : 'no'}</td>
                    </tr>
                `;
            }).join('');
        }

        function sortTable(column) {
            if (sortColumn === column) {
                sortDesc = !sortDesc;
            } else {
                sortColumn = column;
                sortDesc = false;
            }

            // Update header indicators
            document.querySelectorAll('th').forEach(th => th.classList.remove('sorted', 'desc'));
            event.target.classList.add('sorted');
            if (sortDesc) event.target.classList.add('desc');

            updateSessionsTable();
        }

        function updateSessionCount() {
            const count = Object.keys(sessions).length;
            document.getElementById('activeSessions').textContent = count;
        }

        function updateUptime() {
            const elapsed = Date.now() - SERVER_START_TIME;
            const seconds = Math.floor(elapsed / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            let uptimeStr;
            if (days > 0) {
                uptimeStr = `${days}d ${hours % 24}h`;
            } else if (hours > 0) {
                uptimeStr = `${hours}h ${minutes % 60}m`;
            } else if (minutes > 0) {
                uptimeStr = `${minutes}m ${seconds % 60}s`;
            } else {
                uptimeStr = `${seconds}s`;
            }

            document.getElementById('uptime').textContent = uptimeStr;
        }

        function toFixed(num, digits) {
            return Number(num).toFixed(digits);
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
