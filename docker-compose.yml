services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/SuperSecureHuman/ingesta-backend:latest}
    container_name: ingesta-backend
    ports:
      - "8000:8000"
    environment:
      - MEDIA_ROOT=/media
      - DATABASE_URL=sqlite+aio:///./data/hls_poc.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-prod}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin-key-test-value}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - FFPROBE_PATH=/usr/bin/ffprobe
      - DISABLE_HW_ENCODING=1
    volumes:
      - ./data:/app/data
      - ${MEDIA_ROOT:-/path/to/media}:/media
    networks:
      - ingesta-network
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/SuperSecureHuman/ingesta-frontend:latest}
    container_name: ingesta-frontend
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ingesta-network
    restart: unless-stopped

  # Nginx reverse proxy to expose single endpoint
  nginx:
    image: nginx:alpine
    container_name: ingesta-proxy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ingesta-network
    restart: unless-stopped

networks:
  ingesta-network:
    driver: bridge
